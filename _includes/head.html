<!-- Initialize dataLayer -->
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){ dataLayer.push(arguments); }

  // Optional debug (remove in production if not needed)
  gtag('set', 'debug_mode', true);
</script>

<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet">

<!-- Initialize dataLayer -->
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){ dataLayer.push(arguments); }

  // Debug mode (remove later)
  gtag('set', 'debug_mode', true);

  function debugLog(msg, data) {
    console.log('[CONSENT DEBUG]', msg, data || '');
  }
</script>

<!-- DEFAULT CONSENT -->
<script>
  gtag('consent', 'default', {
    analytics_storage: 'denied',
    ad_storage: 'denied',
    ad_user_data: 'denied',
    ad_personalization: 'denied',
    wait_for_update: 500
  });
</script>

<!-- Load Google Analytics with fallback detection -->
<script>
  function loadGA() {
    return new Promise((resolve, reject) => {
      const script = document.createElement('script');
      script.async = true;
      script.src = "https://www.googletagmanager.com/gtag/js?id=G-N08CPLZ22R";

      script.onload = () => {
        debugLog('GA loaded successfully');
        resolve();
      };

      script.onerror = () => {
        debugLog('GA FAILED to load (likely blocked)');
        reject();
      };

      document.head.appendChild(script);
    });
  }

  function initGA() {
    gtag('js', new Date());

    gtag('config', 'G-N08CPLZ22R', {
      send_page_view: false
    });
  }
</script>

<!-- Silktide (CDN version to avoid path issues) -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/silktide/cookieconsent@latest/dist/silktide-consent-manager.css">

<script src="https://cdn.jsdelivr.net/gh/silktide/cookieconsent@latest/dist/silktide-consent-manager.js"></script>

<script>
  // Initialize Silktide
  silktideCookieBannerManager.updateCookieBannerConfig({
    forceShow: false,
    openPreferencesOnLoad: false,
    cookieIcon: { position: "bottomLeft" },
    cookieTypes: [
      {
        id: "necessary",
        name: "Essential cookies",
        description: "Required for the website to function properly.",
        required: true
      },
      {
        id: "analytics",
        name: "Analytics cookies",
        description: "Help us understand how visitors use our website.",
        defaultValue: false
      },
      {
        id: "advertising",
        name: "Advertising cookies",
        description: "Used to deliver relevant ads.",
        defaultValue: false
      }
    ]
  });

  /* ----------------------------------------
     LOAD GA FIRST (if possible)
  ---------------------------------------- */
  let gaLoaded = false;

  loadGA()
    .then(() => {
      gaLoaded = true;
      initGA();
    })
    .catch(() => {
      debugLog('GA blocked — tracking will not work in this environment');
    });

  /* ----------------------------------------
     CONSENT LISTENER (CRITICAL)
  ---------------------------------------- */
  document.addEventListener('silktideCookieBannerManager:consentChanged', function(event) {
    const consent = event.detail;

    debugLog('Consent changed:', consent);

    if (!gaLoaded) {
      debugLog('Skipping tracking — GA not loaded');
      return;
    }

    // Analytics
    if (consent.analytics) {
      gtag('consent', 'update', {
        analytics_storage: 'granted'
      });

      gtag('event', 'page_view', {
        page_path: window.location.pathname
      });

      debugLog('Analytics enabled → page_view sent');
    } else {
      gtag('consent', 'update', {
        analytics_storage: 'denied'
      });
    }

    // Ads
    if (consent.advertising) {
      gtag('consent', 'update', {
        ad_storage: 'granted',
        ad_user_data: 'granted',
        ad_personalization: 'granted'
      });

      debugLog('Ads enabled');
    } else {
      gtag('consent', 'update', {
        ad_storage: 'denied',
        ad_user_data: 'denied',
        ad_personalization: 'denied'
      });
    }
  });
</script>
