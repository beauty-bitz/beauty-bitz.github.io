<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet">

<!-- Initialize dataLayer -->
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){ dataLayer.push(arguments); }

  // Optional debug (remove in production if not needed)
  gtag('set', 'debug_mode', true);
</script>

<!-- DEFAULT CONSENT (must come BEFORE GA loads) -->
<script>
  gtag('consent', 'default', {
    analytics_storage: 'denied',
    ad_storage: 'denied',
    ad_user_data: 'denied',
    ad_personalization: 'denied',
    wait_for_update: 500
  });
</script>

<!-- Load Google Analytics -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-N08CPLZ22R"></script>

<script>
  gtag('js', new Date());

  // Disable automatic page view
  gtag('config', 'G-N08CPLZ22R', {
    send_page_view: false
  });
</script>

<!-- Silktide Cookie Banner -->
<script>
  // Load Silktide assets
  const css = document.createElement("link");
  css.rel = "stylesheet";
  css.href = "/Silktide/silktide-consent-manager.css";
  document.head.appendChild(css);

  const script = document.createElement("script");
  script.src = "/Silktide/silktide-consent-manager.js";
  document.head.appendChild(script);

  // Debug helper
  function debugLog(msg, data) {
    console.log('[CONSENT DEBUG]', msg, data || '');
  }

  script.onload = function() {
    silktideCookieBannerManager.updateCookieBannerConfig({
      forceShow: false,
      openPreferencesOnLoad: false,
      cookieIcon: { position: "bottomLeft" },
      cookieTypes: [
        {
          id: "necessary",
          name: "Essential cookies",
          description: "Required for the website to function properly and cannot be disabled.",
          required: true
        },
        {
          id: "analytics",
          name: "Analytics cookies",
          description: "Help us understand how visitors use our website.",
          defaultValue: false
        },
        {
          id: "advertising",
          name: "Advertising cookies",
          description: "Used to deliver relevant ads.",
          defaultValue: false
        }
      ]
    });
  };

  /* ----------------------------------------
     GLOBAL CONSENT LISTENER (CRITICAL FIX)
  ---------------------------------------- */
  document.addEventListener('silktideCookieBannerManager:consentChanged', function(event) {
    const consent = event.detail;

    debugLog('Consent changed:', consent);

    // Analytics consent
    if (consent.analytics) {
      gtag('consent', 'update', {
        analytics_storage: 'granted'
      });

      // Fire page view AFTER consent
      gtag('event', 'page_view', {
        page_path: window.location.pathname
      });

      debugLog('Analytics enabled → page_view sent');
    } else {
      gtag('consent', 'update', {
        analytics_storage: 'denied'
      });
    }

    // Advertising consent
    if (consent.advertising) {
      gtag('consent', 'update', {
        ad_storage: 'granted',
        ad_user_data: 'granted',
        ad_personalization: 'granted'
      });

      debugLog('Ads consent granted');
    } else {
      gtag('consent', 'update', {
        ad_storage: 'denied',
        ad_user_data: 'denied',
        ad_personalization: 'denied'
      });
    }
  });
</script>
