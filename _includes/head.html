<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet">

<!-- =========================
     1. SILKTIDE CONFIG (MUST BE FIRST)
========================= -->
<script>
  window.silktideCookieBannerManagerConfig = {
    autoInit: false
  };
</script>


<!-- =========================
     2. GOOGLE ANALYTICS
========================= -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-N08CPLZ22R"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){ dataLayer.push(arguments); }

  // Default: denied (compliance)
  gtag('consent', 'default', {
    analytics_storage: 'denied',
    ad_storage: 'denied',
    ad_user_data: 'denied',
    ad_personalization: 'denied',
    wait_for_update: 500
  });

  gtag('js', new Date());

  // Prevent automatic pageview
  gtag('config', 'G-N08CPLZ22R', {
    send_page_view: false
  });
</script>


<!-- =========================
     3. SILKTIDE (SELF-HOSTED)
========================= -->
<link rel="stylesheet" href="/Silktide/silktide-consent-manager.css">
<script src="/Silktide/silktide-consent-manager.js"></script>


<!-- =========================
     4. CONSENT + REGION LOGIC
========================= -->
<script>
  /* -------------------------
     ENABLE TRACKING
  ------------------------- */
  function enableTracking() {
    gtag('consent', 'update', {
      analytics_storage: 'granted',
      ad_storage: 'granted',
      ad_user_data: 'granted',
      ad_personalization: 'granted'
    });

    gtag('event', 'page_view', {
      page_path: window.location.pathname
    });

    console.log('[CONSENT] Tracking enabled');
  }


  /* -------------------------
     INIT SILKTIDE
  ------------------------- */
  function initSilktide() {
    if (typeof silktideCookieBannerManager === 'undefined') {
      setTimeout(initSilktide, 50);
      return;
    }

    silktideCookieBannerManager.init({
      cookieTypes: [
        { id: "necessary", required: true },
        { id: "analytics", defaultValue: false },
        { id: "advertising", defaultValue: false }
      ]
    });

    document.addEventListener('silktideCookieBannerManager:consentChanged', function(e) {
      const consent = e.detail;

      if (consent.analytics) {
        enableTracking();
      }
    });

    console.log('[CONSENT] Silktide initialized');
  }


  /* -------------------------
     REGION DETECTION
  ------------------------- */
  const lang = navigator.language || navigator.userLanguage;
  console.log('LANGUSED:', lang);

  const euLangs = [
    'en-GB','fr-FR','de-DE','es-ES','it-IT','nl-NL','sv-SE','da-DK',
    'fi-FI','pl-PL','cs-CZ','hu-HU','ro-RO','sk-SK','sl-SI','bg-BG',
    'hr-HR','lt-LT','lv-LV','et-EE','mt-MT','el-GR','pt-PT'
  ];

  const isLikelyEU = euLangs.includes(lang);
  console.log('isEU:', isLikelyEU);


  /* -------------------------
     MAIN LOGIC
  ------------------------- */
  if (isLikelyEU) {
    // 🇪🇺 EU/UK → show banner
    initSilktide();
  } else {
    // 🌎 Non-EU → auto tracking
    enableTracking();

    // Safety: ensure banner never appears
    const style = document.createElement('style');
    style.innerHTML = `
      .silktide-cookie-banner {
        display: none !important;
      }
    `;
    document.head.appendChild(style);
  }
</script>
